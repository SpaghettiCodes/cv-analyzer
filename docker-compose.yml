services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    expose:
      - "6379"
    networks:
      - backend

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    expose:
      - "27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - backend_data:/data
    networks:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_BACKEND_URL: http://localhost:5000
      HOST: 0.0.0.0
      WDS_SOCKET_PORT: 0
    depends_on:
      - backend

  celery_worker:
    build: ./backend
    command: celery -A celery_app.app worker --loglevel=info
    depends_on:
      redis:
        condition: service_started
      mongo:
        condition: service_healthy
    env_file:
      - ./backend/.env
    networks:
      - backend
    volumes:
      - backend_data:/data

volumes:
  mongo_data:
  backend_data:

networks:
  backend: